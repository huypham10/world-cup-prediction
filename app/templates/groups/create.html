{% extends "base.html" %}
{% block title %}New Group — World Cup Pool{% endblock %}
{% block content %}
<div class="bg-white rounded-lg shadow p-8 max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-2">Create a group</h1>
  <p class="text-sm text-gray-500 mb-6">Set per-round wagers after creating the group.</p>
  {% if errors %}
    <ul class="mb-4 text-red-600 text-sm space-y-1 bg-red-50 rounded p-3">
      {% for err in errors %}<li>{{ err }}</li>{% endfor %}
    </ul>
  {% endif %}
  <form method="post" action="/groups/new" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Group name</label>
      <input name="name" type="text" value="{{ name or '' }}" required autofocus
        class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
    </div>
    <button type="submit"
      class="w-full bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700 font-medium transition-colors">
      Create group
    </button>
  </form>
  <p class="mt-4 text-sm text-center text-gray-600">
    <a href="/groups" class="text-green-600 hover:underline">Back to groups</a>
  </p>
</div>
{% endblock %}
