{% extends "base.html" %}
{% block title %}Join Group — World Cup Pool{% endblock %}
{% block content %}
<div class="bg-white rounded-lg shadow p-8 max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-6">Join a group</h1>
  {% if error %}
    <p class="mb-4 text-red-600 text-sm bg-red-50 rounded p-3">{{ error }}</p>
  {% endif %}
  <form method="post" action="/groups/join" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Join code</label>
      <input name="join_code" type="text" value="{{ join_code or '' }}" placeholder="ABCD1234"
        maxlength="8" required autofocus
        class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500 font-mono uppercase tracking-widest">
    </div>
    <button type="submit"
      class="w-full bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700 font-medium transition-colors">
      Join group
    </button>
  </form>
  <p class="mt-4 text-sm text-center text-gray-600">
    Don't have a code? <a href="/groups/new" class="text-green-600 hover:underline">Create your own group</a>
  </p>
</div>
{% endblock %}
