<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}World Cup Pool{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen overflow-x-hidden">
  <nav class="bg-green-700 text-white px-4 sm:px-6 py-3 flex items-center justify-between shadow">
    <a href="/" class="font-bold text-lg tracking-tight shrink-0">Dự đoán WC26</a>
    <div class="flex gap-3 sm:gap-5 items-center text-sm min-w-0">
      {% if current_user %}
        {% if current_user.id == 1 %}
          <a href="/admin" class="hover:underline shrink-0 text-right leading-tight">
            <span class="block truncate max-w-[7rem]">{{ current_user.name }}</span>
            <span class="block text-xs opacity-60">Admin</span>
          </a>
        {% else %}
          <span class="opacity-75 truncate max-w-[7rem] shrink-0">{{ current_user.name }}</span>
        {% endif %}
        <a href="/groups" class="hover:underline shrink-0">Groups</a>
        <a href="/matches" class="hover:underline shrink-0">Matches</a>
        <form method="post" action="/logout" class="inline shrink-0">
          <button type="submit" class="hover:underline">Logout</button>
        </form>
      {% else %}
        <a href="/login" class="hover:underline">Login</a>
        <a href="/register" class="font-semibold hover:underline">Register</a>
      {% endif %}
    </div>
  </nav>
  <main class="max-w-2xl mx-auto mt-8 px-4 pb-16">
    {% block content %}{% endblock %}
  </main>
  <script>
    const _tz = new Intl.DateTimeFormat([], { timeZoneName: 'short' });
    function tzAbbr(dt) {
      return _tz.formatToParts(dt).find(p => p.type === 'timeZoneName')?.value ?? '';
    }
    function localizeTimes(root) {
      (root || document).querySelectorAll('time[data-utc]').forEach(el => {
        const dt = new Date(el.getAttribute('data-utc'));
        if (el.dataset.format === 'date') {
          el.textContent = dt.toLocaleString([], { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        } else {
          const time = dt.toLocaleString([], { hour: '2-digit', minute: '2-digit' });
          const date = dt.toLocaleString([], { weekday: 'short', day: 'numeric', month: 'short' });
          el.textContent = date + ' · ' + time + ' ' + tzAbbr(dt);
        }
      });
    }
    localizeTimes();
    document.body.addEventListener('htmx:afterSwap', e => localizeTimes(e.detail.elt));
  </script>
</body>
</html>
