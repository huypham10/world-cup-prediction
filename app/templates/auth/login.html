{% extends "base.html" %}
{% block title %}Login — World Cup Pool{% endblock %}
{% block content %}
<div class="bg-white rounded-lg shadow p-8 max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-6">Log in</h1>
  {% if error %}
    <p class="mb-4 text-red-600 text-sm bg-red-50 rounded p-3">{{ error }}</p>
  {% endif %}
  <form method="post" action="/login" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
      <input name="name" type="text" value="{{ name or '' }}" required autofocus
        class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">PIN</label>
      <input name="pin" type="password" inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
        placeholder="••••••" required
        class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
    </div>
    <button type="submit"
      class="w-full bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700 font-medium transition-colors">
      Log in
    </button>
  </form>
  <p class="mt-4 text-sm text-center text-gray-600">
    New here? <a href="/register" class="text-green-600 hover:underline">Create an account</a>
  </p>
</div>
{% endblock %}
